<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>📚 FlipBook</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0e1a;--bg2:#181728;--bg3:#221f35;
  --gold:#c9a84c;--gold2:#a07828;
  --text:#dde0ec;--muted:#6b678f;
  --brd:rgba(255,255,255,.08)
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}
input[type=file]{display:none}

/* ── DROP SCREEN ── */
#drop{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:var(--bg);
  z-index:10
}
.drop-box{
  border:2px dashed rgba(201,168,76,.35);
  border-radius:20px;
  padding:60px 48px;
  text-align:center;
  cursor:pointer;
  transition:.25s;
  max-width:480px;
  width:90vw;
  background:rgba(201,168,76,.03)
}
.drop-box:hover,.drop-box.over{
  border-color:var(--gold);
  background:rgba(201,168,76,.08)
}
.drop-box h1{font-size:28px;font-weight:700;margin-bottom:8px}
.drop-box h1 em{color:var(--gold);font-style:normal}
.drop-box p{font-size:14px;color:var(--muted);margin-bottom:28px}
.pick-btn{
  display:inline-block;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#0f0e1a;padding:12px 32px;
  border-radius:10px;font-size:15px;
  font-weight:600;cursor:pointer;
  transition:.15s
}
.pick-btn:hover{opacity:.88;transform:translateY(-1px)}
.ftags{display:flex;justify-content:center;gap:8px;margin-top:20px}
.tag{padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600}
.tpdf{background:rgba(220,70,50,.15);color:#f07060;border:1px solid rgba(220,70,50,.25)}
.tppt{background:rgba(210,100,40,.15);color:#f0a060;border:1px solid rgba(210,100,40,.25)}

/* ── PROCESSING ── */
#proc{
  position:fixed;inset:0;
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  background:var(--bg);z-index:20
}
.spinner{width:52px;height:52px;border:5px solid rgba(201,168,76,.15);border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite;margin-bottom:18px}
@keyframes sp{to{transform:rotate(360deg)}}
.pmsg{font-size:16px;font-weight:500;margin-bottom:6px}
.psub{font-size:13px;color:var(--muted);margin-bottom:14px}
.pbar{width:240px;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;transition:width .3s;width:0%}

/* ── VIEWER ── */
#viewer{
  position:fixed;inset:0;
  display:none;flex-direction:column;
  align-items:center;
  background:var(--bg);
  z-index:5
}

/* top bar */
.topbar{
  width:100%;background:var(--bg2);
  border-bottom:1px solid var(--brd);
  padding:10px 20px;
  display:flex;align-items:center;
  justify-content:space-between;
  gap:10px;flex-shrink:0
}
.docname{font-size:14px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.topbtn{background:transparent;border:1px solid var(--brd);color:var(--muted);padding:5px 13px;border-radius:7px;font-size:13px;cursor:pointer;transition:.15s;white-space:nowrap}
.topbtn:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.topbtn.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0f0e1a;border:none;font-weight:600}
.topbtn.gold:hover{opacity:.88}

/* tool bar */
.tbar{
  display:flex;align-items:center;gap:6px;
  padding:7px 0;flex-shrink:0;
  flex-wrap:wrap;justify-content:center
}
.tb{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#aaa;width:30px;height:30px;border-radius:7px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.tb:hover{background:rgba(255,255,255,.14);color:#ddd}
.tb:active{transform:scale(.92)}
.tsep{width:1px;height:20px;background:var(--brd)}
.zlbl{font-size:12px;color:var(--muted);min-width:36px;text-align:center}

/* book area — takes remaining space */
.book-area{
  flex:1;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  width:100%;
  padding:8px
}

/* BOOK */
.book-wrap{position:relative;display:flex;justify-content:center}

/* Cover: нэг хуудас */
.cover{
  position:relative;
  border-radius:4px 14px 14px 4px;
  box-shadow:0 30px 80px rgba(0,0,0,.85);
  overflow:hidden;background:#f5f0e4
}
.cover canvas{display:block}

/* Spread: хоёр хуудас */
.spread{
  position:relative;display:flex;
  border-radius:3px 10px 10px 3px;
  box-shadow:0 30px 80px rgba(0,0,0,.85)
}
.spread::before{content:'';position:absolute;left:0;top:0;bottom:0;width:7px;background:linear-gradient(to right,rgba(0,0,0,.55),rgba(0,0,0,.08));z-index:10;border-radius:3px 0 0 3px;pointer-events:none}
.pw{position:relative;overflow:hidden;background:#f5f0e4}
.pw.L{border-radius:3px 0 0 3px;box-shadow:inset -10px 0 22px rgba(0,0,0,.28)}
.pw.R{border-radius:0 10px 10px 0;box-shadow:inset 8px 0 18px rgba(0,0,0,.1)}
.pw.R::after{content:'';position:absolute;bottom:0;right:0;width:40px;height:40px;background:linear-gradient(225deg,#181728 45%,transparent 45%);opacity:.5;pointer-events:none}
.pw canvas{display:block}

/* flip */
.fliplay{position:absolute;top:0;transform-origin:left center;transform-style:preserve-3d;z-index:30;pointer-events:none;display:none}
.ff,.fb{position:absolute;top:0;left:0;backface-visibility:hidden;-webkit-backface-visibility:hidden}
.fb{transform:rotateY(180deg)}
@keyframes fwd{from{transform:rotateY(0)}to{transform:rotateY(-180deg)}}
@keyframes bwd{from{transform:rotateY(-180deg)}to{transform:rotateY(0)}}
.gofwd{display:block;animation:fwd .62s cubic-bezier(.645,.045,.355,1) forwards}
.gobwd{display:block;animation:bwd .62s cubic-bezier(.645,.045,.355,1) forwards}

/* controls */
.ctrls{
  display:flex;align-items:center;gap:10px;
  padding:8px 0;flex-shrink:0
}
.ctrl{background:rgba(201,168,76,.13);border:1px solid rgba(201,168,76,.26);color:var(--gold);width:36px;height:36px;border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.ctrl:hover{background:rgba(201,168,76,.26)}.ctrl:active{transform:scale(.92)}.ctrl:disabled{opacity:.22;cursor:default}
.pinfo{font-size:13px;color:var(--muted);min-width:90px;text-align:center}
.pinfo b{color:var(--gold);font-weight:600}

/* thumbs */
.thumbbar{
  display:flex;gap:5px;
  padding:6px 12px 8px;
  overflow-x:auto;flex-shrink:0;
  max-width:100%;
  scrollbar-width:thin;scrollbar-color:#2a2940 transparent
}
.th{flex-shrink:0;cursor:pointer;border:2px solid transparent;border-radius:4px;overflow:hidden;opacity:.44;transition:.2s;position:relative}
.th:hover{opacity:.74}.th.on{border-color:var(--gold);opacity:1}
.th canvas,.th img{display:block}
.tnum{position:absolute;bottom:2px;left:0;right:0;text-align:center;font-size:9px;color:rgba(255,255,255,.75);background:rgba(0,0,0,.5)}

/* hint */
.hint{font-size:11px;color:#2a2840;padding:2px 0 4px;flex-shrink:0}
.hint kbd{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:3px;padding:1px 4px;font-family:monospace;font-size:10px}

/* toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e1c30;color:var(--text);border:1px solid var(--brd);padding:8px 18px;border-radius:28px;font-size:13px;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}

@media(max-width:520px){.pw.L{display:none}.spread::before{display:none}}
</style>
</head>
<body>

<!-- DROP SCREEN -->
<div id="drop">
  <label class="drop-box" id="dz" for="fi">
    <h1>PDF & PPTX-ийг <em>flipbook</em> болгох</h1>
    <p>Файлаа сонгоход шууд ном болгон нээгдэнэ</p>
    <span class="pick-btn">📂 Файл сонгох</span>
    <div class="ftags">
      <span class="tag tpdf">PDF</span>
      <span class="tag tppt">PPTX · PPT</span>
    </div>
  </label>
  <input type="file" id="fi" accept=".pdf,.pptx,.ppt">
</div>

<!-- PROCESSING -->
<div id="proc">
  <div class="spinner"></div>
  <div class="pmsg" id="pmsg">Боловсруулж байна...</div>
  <div class="psub" id="psub"></div>
  <div class="pbar"><div class="pfill" id="pfill"></div></div>
</div>

<!-- VIEWER -->
<div id="viewer">
  <!-- top bar -->
  <div class="topbar">
    <div class="docname" id="docname">—</div>
    <label class="topbtn gold" for="fi">＋ Шинэ файл</label>
    <button class="topbtn" id="fsBtn">⛶</button>
  </div>

  <!-- tool bar -->
  <div class="tbar">
    <button class="tb" id="zOut">−</button>
    <span class="zlbl" id="zlbl">100%</span>
    <button class="tb" id="zIn">+</button>
    <div class="tsep"></div>
    <button class="tb" id="fitBtn" title="Дэлгэцэнд тохируулах">⊡</button>
  </div>

  <!-- book -->
  <div class="book-area" id="bookArea">
    <div class="book-wrap" id="bookWrap"></div>
  </div>

  <!-- controls -->
  <div class="ctrls">
    <button class="ctrl" id="goFirst">⟪</button>
    <button class="ctrl" id="goPrev">‹</button>
    <div class="pinfo" id="pinfo"></div>
    <button class="ctrl" id="goNext">›</button>
    <button class="ctrl" id="goLast">⟫</button>
  </div>

  <div class="hint"><kbd>←</kbd> <kbd>→</kbd> хуудас &nbsp;·&nbsp; <kbd>+</kbd> <kbd>−</kbd> томруулах &nbsp;·&nbsp; <kbd>Space</kbd> дараагийн</div>

  <!-- thumbs -->
  <div class="thumbbar" id="thumbbar"></div>
</div>

<div class="toast" id="toast"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* ── STATE ─────────────────────────────── */
let pdfDoc = null, slides = [], fileType = '';
let totalPages = 0, spread = 0, busy = false;
let rawW = 0, rawH = 0, fitSc = 1;

/* spread logic:
   spread=0 → cover (зөвхөн 1-р хуудас)
   spread≥1 → L=spread*2, R=spread*2+1
*/
const totalSpreads = () => totalPages <= 1 ? 1 : Math.ceil((totalPages - 1) / 2) + 1;
const spreadPages  = s => s === 0
  ? { l: 1, r: 0 }
  : { l: s * 2, r: s * 2 + 1 <= totalPages ? s * 2 + 1 : 0 };

/* ── SCREENS ───────────────────────────── */
const $ = id => document.getElementById(id);
const showDrop   = () => { $('drop').style.display='flex'; $('proc').style.display='none'; $('viewer').style.display='none'; }
const showProc   = () => { $('drop').style.display='none'; $('proc').style.display='flex'; $('viewer').style.display='none'; }
const showViewer = () => { $('drop').style.display='none'; $('proc').style.display='none'; $('viewer').style.display='flex'; }

/* ── FILE INPUT ────────────────────────── */
$('fi').onchange = e => { if (e.target.files[0]) load(e.target.files[0]); e.target.value = ''; };
const dz = $('dz');
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); if (e.dataTransfer.files[0]) load(e.dataTransfer.files[0]); });

/* ── LOAD ──────────────────────────────── */
async function load(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['pdf','pptx','ppt'].includes(ext)) { toast('⚠️ PDF эсвэл PPTX файл оруулна уу'); return; }
  fileType = ext === 'pdf' ? 'pdf' : 'pptx';
  $('docname').textContent = file.name.replace(/\.[^.]+$/, '');
  showProc();
  setP(5, 'Файл уншиж байна...');
  try {
    const buf = await file.arrayBuffer();
    if (fileType === 'pdf') await loadPDF(buf);
    else                    await loadPPTX(buf);
  } catch(err) {
    showDrop(); toast('⚠️ ' + err.message); console.error(err);
  }
}

/* ── PDF ───────────────────────────────── */
async function loadPDF(buf) {
  pdfDoc = null; slides = [];
  const task = pdfjsLib.getDocument({ data: buf });
  task.onProgress = p => { if (p.total) setP(5 + p.loaded / p.total * 30, 'PDF уншиж байна...'); };
  pdfDoc = await task.promise;
  totalPages = pdfDoc.numPages;
  setP(38, '');
  const vp = (await pdfDoc.getPage(1)).getViewport({ scale: 1 });
  rawW = vp.width; rawH = vp.height;
  calcFit();
  await buildThumbs();
  showViewer();
  await renderSpread(0);
}

/* ── PPTX ──────────────────────────────── */
async function loadPPTX(buf) {
  pdfDoc = null; slides = [];
  const zip = await JSZip.loadAsync(buf);
  let sW = 960, sH = 540;
  try {
    const px = await zip.file('ppt/presentation.xml').async('string');
    const cM = px.match(/cx="(\d+)"/), yM = px.match(/cy="(\d+)"/);
    if (cM && yM) { sW = Math.round(parseInt(cM[1])/914400*96); sH = Math.round(parseInt(yM[1])/914400*96); }
  } catch(e) {}
  const sFiles = Object.keys(zip.files)
    .filter(f => /^ppt\/slides\/slide\d+\.xml$/.test(f))
    .sort((a,b) => parseInt(a.match(/\d+/)[0]) - parseInt(b.match(/\d+/)[0]));
  totalPages = sFiles.length;
  if (!totalPages) throw new Error('Слайд олдсонгүй');
  const rW = Math.max(sW, 640), rH = Math.round(rW * sH / sW);
  rawW = rW; rawH = rH;
  const media = {};
  for (const [p, e] of Object.entries(zip.files)) {
    if (p.startsWith('ppt/media/') && !e.dir) {
      const ex = p.split('.').pop().toLowerCase();
      media[p.split('/').pop()] = URL.createObjectURL(new Blob([await e.async('blob')], { type: ex === 'png' ? 'image/png' : 'image/jpeg' }));
    }
  }
  for (let i = 0; i < sFiles.length; i++) {
    setP(10 + i / sFiles.length * 70, `Слайд ${i+1}/${sFiles.length}`);
    slides.push(await renderSlide(zip, sFiles[i], sW, sH, rW, rH, media));
  }
  calcFit();
  await buildThumbs();
  showViewer();
  await renderSpread(0);
}

/* ── FIT SCALE ─────────────────────────── */
function calcFit() {
  const aw = window.innerWidth - 24;
  const ah = window.innerHeight - 160; // topbar+tbar+ctrls+thumbs+hint
  // cover uses 1 page, spread uses 2 side by side
  const sc1 = Math.min(aw / rawW, ah / rawH);
  const sc2 = Math.min((aw / 2) / rawW, ah / rawH);
  fitSc = Math.min(sc1, sc2, 1.8);
  fitSc = Math.max(fitSc, 0.25);
}

/* ── RENDER SPREAD ─────────────────────── */
async function renderSpread(s) {
  spread = s;
  const { l, r } = spreadPages(s);
  const isCover = s === 0;
  const sc = fitSc;
  const W = Math.round(rawW * sc), H = Math.round(rawH * sc);
  const wrap = $('bookWrap');
  wrap.innerHTML = '';

  if (isCover) {
    const div = document.createElement('div');
    div.className = 'cover';
    div.style.width = W + 'px'; div.style.height = H + 'px';
    const cv = mkC(W, H, 'cvC');
    div.appendChild(cv); wrap.appendChild(div);
    await drawScaled(cv, 1, sc);
    $('pinfo').innerHTML = `<b>Нүүр</b> / <b>${totalPages}</b>`;
  } else {
    const div = document.createElement('div'); div.className = 'spread';
    const pL = document.createElement('div'); pL.className = 'pw L';
    pL.style.width = W + 'px'; pL.style.height = H + 'px';
    const cvL = mkC(W, H, 'cvL'); pL.appendChild(cvL); div.appendChild(pL);
    const pR = document.createElement('div'); pR.className = 'pw R';
    pR.style.width = W + 'px'; pR.style.height = H + 'px';
    const cvR = mkC(W, H, 'cvR'); pR.appendChild(cvR); div.appendChild(pR);
    const fl = document.createElement('div'); fl.className = 'fliplay'; fl.id = 'FL';
    fl.style.width = W + 'px'; fl.style.height = H + 'px';
    const ff = mkC(W, H, 'FF'); ff.className = 'ff';
    const fb = mkC(W, H, 'FB'); fb.className = 'fb';
    fl.appendChild(ff); fl.appendChild(fb); div.appendChild(fl);
    wrap.appendChild(div);
    await drawScaled(cvL, l, sc);
    if (r) await drawScaled(cvR, r, sc); else blank(cvR);
    $('pinfo').innerHTML = r ? `<b>${l}</b>–<b>${r}</b> / <b>${totalPages}</b>` : `<b>${l}</b> / <b>${totalPages}</b>`;
  }
  updThumb(); updBtns();
}

async function drawScaled(cv, pn, sc) {
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#f5f0e4'; ctx.fillRect(0, 0, cv.width, cv.height);
  if (!pn) return;
  if (fileType === 'pdf') {
    const pg = await pdfDoc.getPage(pn);
    const vp = pg.getViewport({ scale: sc });
    cv.width = vp.width; cv.height = vp.height;
    ctx.fillStyle = '#f5f0e4'; ctx.fillRect(0, 0, cv.width, cv.height);
    await pg.render({ canvasContext: ctx, viewport: vp }).promise;
  } else {
    const img = new Image();
    await new Promise(res => { img.onload = res; img.src = slides[pn - 1]; });
    ctx.drawImage(img, 0, 0, cv.width, cv.height);
  }
}
const blank = cv => { const ctx = cv.getContext('2d'); ctx.fillStyle = '#f0ebe0'; ctx.fillRect(0, 0, cv.width, cv.height); };

/* ── FLIP ──────────────────────────────── */
async function flipFwd() {
  const ts = totalSpreads();
  if (busy || spread >= ts - 1) return;
  busy = true;
  const nx = spread + 1;
  const sc = fitSc;
  const W = Math.round(rawW * sc);

  if (spread === 0) { busy = false; await renderSpread(nx); return; }

  const cvR = $('cvR'), FL = $('FL');
  if (!cvR || !FL) { busy = false; await renderSpread(nx); return; }
  const { l: nl, r: nr } = spreadPages(nx);
  $('FF').getContext('2d').drawImage(cvR, 0, 0);
  await drawScaled($('FB'), nl, sc);
  FL.style.left = W + 'px'; FL.className = 'fliplay gofwd';
  await drawScaled($('cvL'), nl, sc);
  if (nr) await drawScaled(cvR, nr, sc); else blank(cvR);
  FL.addEventListener('animationend', () => {
    FL.className = 'fliplay'; spread = nx;
    const { l, r } = spreadPages(nx);
    $('pinfo').innerHTML = r ? `<b>${l}</b>–<b>${r}</b> / <b>${totalPages}</b>` : `<b>${l}</b> / <b>${totalPages}</b>`;
    updThumb(); updBtns(); busy = false;
  }, { once: true });
}

async function flipBwd() {
  if (busy || spread <= 0) return;
  busy = true;
  const pv = spread - 1;
  const sc = fitSc;
  const W = Math.round(rawW * sc);

  if (pv === 0) { busy = false; await renderSpread(0); return; }

  const cvL = $('cvL'), FL = $('FL');
  if (!cvL || !FL) { busy = false; await renderSpread(pv); return; }
  const { l: pl, r: pr } = spreadPages(pv);
  $('FB').getContext('2d').drawImage(cvL, 0, 0);
  if (pr) await drawScaled($('FF'), pr, sc); else blank($('FF'));
  FL.style.left = W + 'px'; FL.className = 'fliplay gobwd';
  await drawScaled(cvL, pl, sc);
  if (pr) await drawScaled($('cvR'), pr, sc); else blank($('cvR'));
  FL.addEventListener('animationend', () => {
    FL.className = 'fliplay'; spread = pv;
    const { l, r } = spreadPages(pv);
    $('pinfo').innerHTML = r ? `<b>${l}</b>–<b>${r}</b> / <b>${totalPages}</b>` : `<b>${l}</b> / <b>${totalPages}</b>`;
    updThumb(); updBtns(); busy = false;
  }, { once: true });
}

$('goPrev').onclick  = flipBwd;
$('goNext').onclick  = flipFwd;
$('goFirst').onclick = () => { if (!busy) renderSpread(0); };
$('goLast').onclick  = () => { if (!busy) renderSpread(totalSpreads() - 1); };

document.addEventListener('keydown', e => {
  if ($('viewer').style.display === 'none') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); flipFwd(); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   flipBwd();
  if (e.key === '+' || e.key === '=') adjScale(0.08);
  if (e.key === '-') adjScale(-0.08);
});

let tx = 0;
$('bookArea').addEventListener('touchstart', e => tx = e.touches[0].clientX, { passive: true });
$('bookArea').addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (dx < -50) flipFwd(); else if (dx > 50) flipBwd();
});

function updBtns() {
  const ts = totalSpreads();
  $('goPrev').disabled  = spread <= 0;
  $('goFirst').disabled = spread <= 0;
  $('goNext').disabled  = spread >= ts - 1;
  $('goLast').disabled  = spread >= ts - 1;
}

/* ── ZOOM ──────────────────────────────── */
async function adjScale(d) {
  fitSc = Math.max(0.15, Math.min(2.5, fitSc + d));
  $('zlbl').textContent = Math.round(fitSc / calcBaseFit() * 100) + '%';
  await renderSpread(spread);
}
function calcBaseFit() {
  const aw = window.innerWidth - 24, ah = window.innerHeight - 160;
  return Math.min(Math.min(aw / rawW, ah / rawH), Math.min((aw/2) / rawW, ah / rawH), 1.8);
}
$('zIn').onclick  = () => adjScale(0.08);
$('zOut').onclick = () => adjScale(-0.08);
$('fitBtn').onclick = async () => { calcFit(); $('zlbl').textContent = '100%'; await renderSpread(spread); };
$('fsBtn').onclick  = () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
};
window.addEventListener('resize', () => {
  if ($('viewer').style.display !== 'none') { calcFit(); renderSpread(spread); }
});

/* ── THUMBS ────────────────────────────── */
async function buildThumbs() {
  const tb = $('thumbbar'); tb.innerHTML = '';
  if (fileType === 'pdf') {
    for (let i = 1; i <= totalPages; i++) {
      setP(40 + i / totalPages * 55, `Зураг ${i}/${totalPages}`);
      const pg = await pdfDoc.getPage(i);
      const vp = pg.getViewport({ scale: 0.11 });
      const cv = mkC(vp.width, vp.height);
      const ctx = cv.getContext('2d');
      ctx.fillStyle = '#f5f0e4'; ctx.fillRect(0, 0, vp.width, vp.height);
      await pg.render({ canvasContext: ctx, viewport: vp }).promise;
      tb.appendChild(mkThumb(cv, i));
    }
  } else {
    slides.forEach((src, i) => {
      const img = document.createElement('img');
      img.src = src; img.style.cssText = 'width:60px;height:auto;display:block;';
      tb.appendChild(mkThumb(img, i + 1));
    });
  }
}
function mkThumb(child, pn) {
  const w = document.createElement('div'); w.className = 'th'; w.dataset.p = pn;
  w.appendChild(child);
  const n = document.createElement('div'); n.className = 'tnum'; n.textContent = pn; w.appendChild(n);
  w.onclick = () => {
    if (busy) return;
    renderSpread(pn === 1 ? 0 : Math.ceil((pn - 1) / 2));
  };
  return w;
}
function updThumb() {
  const { l, r } = spreadPages(spread);
  $('thumbbar').querySelectorAll('.th').forEach(t => {
    const p = parseInt(t.dataset.p);
    t.classList.toggle('on', p === l || p === r);
  });
  const a = $('thumbbar').querySelector('.th.on');
  if (a) a.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

/* ── PPTX SLIDE RENDER ─────────────────── */
async function renderSlide(zip, path, sW, sH, rW, rH, media) {
  const xml = await zip.file(path).async('string');
  let bg = '#FFFFFF';
  const bgM = xml.match(/<p:bg>[\s\S]*?<a:srgbClr val="([0-9A-Fa-f]{6})"[\s\S]*?<\/p:bg>/);
  if (bgM) bg = '#' + bgM[1];
  const cv = mkC(rW, rH); const ctx = cv.getContext('2d');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, rW, rH);
  const scX = rW / (sW / 96), scY = rH / (sH / 96);
  for (const m of xml.matchAll(/<p:pic>[\s\S]*?<\/p:pic>/g)) {
    const rI = m[0].match(/r:embed="(rId\d+)"/); if (!rI) continue;
    const rp = path.replace('slides/slide','slides/_rels/slide').replace('.xml','.xml.rels');
    try {
      const rx = await zip.file(rp).async('string');
      const tM = new RegExp(`Id="${rI[1]}"[^>]+Target="([^"]+)"`).exec(rx);
      if (!tM) continue; const tgt = tM[1].split('/').pop(); if (!media[tgt]) continue;
      const oM = m[0].match(/<a:off x="(\d+)" y="(\d+)"/);
      const eM = m[0].match(/<a:ext cx="(\d+)" cy="(\d+)"/); if (!oM || !eM) continue;
      const x=parseInt(oM[1])/914400*scX, y=parseInt(oM[2])/914400*scY;
      const w=parseInt(eM[1])/914400*scX, h=parseInt(eM[2])/914400*scY;
      await new Promise(res=>{const img=new Image();img.onload=()=>{ctx.drawImage(img,x,y,w,h);res();};img.onerror=res;img.src=media[tgt];});
    } catch(e) {}
  }
  for (const sp of xml.matchAll(/<p:sp>[\s\S]*?<\/p:sp>/g)) {
    const oM=sp[0].match(/<a:off x="(\d+)" y="(\d+)"/);
    const eM=sp[0].match(/<a:ext cx="(\d+)" cy="(\d+)"/); if (!oM||!eM) continue;
    const x=parseInt(oM[1])/914400*scX, y=parseInt(oM[2])/914400*scY;
    const bw=parseInt(eM[1])/914400*scX, bh=parseInt(eM[2])/914400*scY;
    const fM=sp[0].match(/<a:solidFill>[\s\S]*?<a:srgbClr val="([0-9A-Fa-f]{6})"[\s\S]*?<\/a:solidFill>/);
    if (fM) { ctx.fillStyle='#'+fM[1]; ctx.fillRect(x,y,bw,bh); }
    let ty=y+8;
    for (const pa of sp[0].matchAll(/<a:p>([\s\S]*?)<\/a:p>/g)) {
      const runs=[...pa[1].matchAll(/<a:r>([\s\S]*?)<\/a:r>/g)];
      if (!runs.length){ty+=14;continue;}
      let txt='',fs=14*scY,bold=false,clr='#111';
      for (const r of runs){
        const sz=r[1].match(/sz="(\d+)"/);if(sz)fs=parseInt(sz[1])/100*scY;
        if(/<a:rPr[^>]*b="1"/.test(r[1]))bold=true;
        const cm=r[1].match(/<a:solidFill>[\s\S]*?<a:srgbClr val="([0-9A-Fa-f]{6})"[\s\S]*?<\/a:solidFill>/);
        if(cm)clr='#'+cm[1];
        for(const t of r[1].matchAll(/<a:t>([^<]*)<\/a:t>/g))txt+=t[1];
      }
      if (txt.trim()) {
        ctx.font=`${bold?'600':'400'} ${Math.max(10,fs)}px Segoe UI,Arial,sans-serif`;
        ctx.fillStyle=clr;ctx.save();ctx.rect(x,y,bw,bh);ctx.clip();
        const wds=txt.split(' ');let ln='';
        for(const wd of wds){const t2=ln+wd+' ';if(ctx.measureText(t2).width>bw-8&&ln){ctx.fillText(ln.trim(),x+5,ty+fs);ty+=fs*1.25;ln=wd+' ';}else ln=t2;}
        if(ln.trim()){ctx.fillText(ln.trim(),x+5,ty+fs);ty+=fs*1.35;}
        ctx.restore();
      } else ty+=fs*1.2;
    }
  }
  return cv.toDataURL('image/jpeg', .92);
}

/* ── HELPERS ───────────────────────────── */
const mkC = (w, h, id) => { const c = document.createElement('canvas'); c.width = w; c.height = h; if (id) c.id = id; return c; };
function setP(v, msg) {
  $('pfill').style.width = v + '%';
  if (msg !== undefined) $('psub').textContent = msg;
}
let _tt;
function toast(msg) {
  const t = $('toast'); t.textContent = msg; t.classList.add('on');
  clearTimeout(_tt); _tt = setTimeout(() => t.classList.remove('on'), 3000);
}
</script>
