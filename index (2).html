<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Миний номын сан</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:      #0f0e1a;
  --bg2:     #1a1929;
  --bg3:     #242338;
  --border:  rgba(255,255,255,.08);
  --gold:    #c9a84c;
  --gold2:   #a07828;
  --text:    #dde0ec;
  --muted:   #6e6a99;
  --radius:  14px;
}

body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; }

/* ===== HEADER ===== */
.site-header {
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:16px 28px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:300;
}
.site-logo { font-size:20px; font-weight:700; color:var(--gold); letter-spacing:.5px; }
.site-logo span { color:var(--text); font-weight:400; }
.header-actions { display:flex; gap:10px; }
.btn {
  padding:8px 16px; border-radius:8px; font-size:13px; font-weight:600;
  cursor:pointer; border:none; transition:opacity .2s, transform .15s;
}
.btn:hover { opacity:.85; transform:translateY(-1px); }
.btn-primary { background:linear-gradient(135deg,var(--gold),var(--gold2)); color:#0f0e1a; }
.btn-ghost   { background:transparent; border:1px solid var(--border); color:var(--muted); }
.btn-ghost:hover { color:var(--text); border-color:rgba(255,255,255,.2); }

/* ===== HOME PAGE ===== */
#homePage { padding:32px 24px; max-width:960px; margin:0 auto; }

.hero { text-align:center; padding:32px 0 40px; }
.hero h1 { font-size:32px; font-weight:700; margin-bottom:10px; }
.hero h1 em { color:var(--gold); font-style:normal; }
.hero p { font-size:15px; color:var(--muted); }

.section-title {
  font-size:13px; font-weight:600; color:var(--muted);
  letter-spacing:1.5px; text-transform:uppercase;
  margin-bottom:16px;
}

/* File grid */
.file-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));
  gap:16px;
  margin-bottom:40px;
}

.file-card {
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px 18px;
  cursor:pointer;
  transition:border-color .2s, transform .2s, background .2s;
  position:relative;
  overflow:hidden;
}
.file-card::before {
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(201,168,76,.06),transparent);
  opacity:0;
  transition:opacity .2s;
}
.file-card:hover { border-color:rgba(201,168,76,.35); transform:translateY(-3px); }
.file-card:hover::before { opacity:1; }

.card-icon { font-size:32px; margin-bottom:12px; display:block; }
.card-name {
  font-size:14px; font-weight:600;
  color:var(--text);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-bottom:4px;
}
.card-meta { font-size:11px; color:var(--muted); }
.card-badge {
  display:inline-block;
  padding:2px 8px; border-radius:20px;
  font-size:10px; font-weight:700;
  letter-spacing:.5px;
  margin-top:8px;
}
.badge-pdf  { background:rgba(220,70,50,.18); color:#f07060; }
.badge-pptx { background:rgba(210,100,40,.18); color:#f09060; }

/* Upload area */
.upload-area {
  border:1.5px dashed rgba(201,168,76,.25);
  border-radius:var(--radius);
  padding:36px;
  text-align:center;
  cursor:pointer;
  transition:border-color .2s, background .2s;
  margin-bottom:24px;
}
.upload-area:hover, .upload-area.over {
  border-color:var(--gold);
  background:rgba(201,168,76,.04);
}
.upload-area p { font-size:13px; color:var(--muted); margin-top:8px; }
.upload-area p strong { color:var(--gold); }

/* No files state */
.empty-state { text-align:center; padding:48px 24px; color:var(--muted); }
.empty-state .icon { font-size:48px; display:block; margin-bottom:16px; }

/* ===== VIEWER PAGE ===== */
#viewerPage { display:none; flex-direction:column; align-items:center; width:100%; padding:16px 16px 48px; }

.back-bar {
  width:100%; max-width:960px;
  display:flex; align-items:center; gap:12px;
  margin-bottom:16px;
}
.back-btn {
  background:var(--bg2); border:1px solid var(--border);
  color:var(--muted); padding:6px 14px; border-radius:8px;
  font-size:13px; cursor:pointer; transition:color .2s;
}
.back-btn:hover { color:var(--text); }
.viewer-filename { font-size:14px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* viewer toolbar */
.toolbar {
  display:flex; align-items:center; gap:8px;
  background:var(--bg2); padding:8px 16px;
  border-radius:40px; border:1px solid var(--border);
  margin-bottom:16px; flex-wrap:wrap; justify-content:center;
}
.tb { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); color:#aaa; width:32px; height:32px; border-radius:7px; font-size:14px; cursor:pointer; transition:background .15s; display:flex; align-items:center; justify-content:center; }
.tb:hover { background:rgba(255,255,255,.12); color:#ddd; }
.tb:active { transform:scale(.93); }
.tb-sep { width:1px; height:24px; background:var(--border); }
.zoom-label { font-size:12px; color:var(--muted); min-width:38px; text-align:center; }

/* book */
.book-stage { perspective:2200px; }
.book { position:relative; display:flex; border-radius:3px 10px 10px 3px; box-shadow:0 50px 100px rgba(0,0,0,.8); }
.book::before { content:''; position:absolute; left:0; top:0; bottom:0; width:7px; background:linear-gradient(to right,rgba(0,0,0,.55),rgba(0,0,0,.08)); z-index:10; border-radius:3px 0 0 3px; pointer-events:none; }
.pw { position:relative; overflow:hidden; background:#f4efe3; }
.pw.L { border-radius:3px 0 0 3px; box-shadow:inset -10px 0 22px rgba(0,0,0,.28); }
.pw.R { border-radius:0 10px 10px 0; box-shadow:inset 8px 0 18px rgba(0,0,0,.1); }
.pw.R::after { content:''; position:absolute; bottom:0; right:0; width:44px; height:44px; background:linear-gradient(225deg,#1a1929 45%,transparent 45%); opacity:.55; pointer-events:none; }
.pw canvas { display:block; }

/* flip */
.flip-layer { position:absolute; top:0; transform-origin:left center; transform-style:preserve-3d; z-index:30; pointer-events:none; display:none; }
.flip-layer .ff,.flip-layer .fb { position:absolute; top:0; left:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; }
.flip-layer .fb { transform:rotateY(180deg); }
@keyframes fwd { from{transform:rotateY(0)} to{transform:rotateY(-180deg)} }
@keyframes bwd { from{transform:rotateY(-180deg)} to{transform:rotateY(0)} }
.flip-layer.go-fwd { display:block; animation:fwd .65s cubic-bezier(.645,.045,.355,1) forwards; }
.flip-layer.go-bwd { display:block; animation:bwd .65s cubic-bezier(.645,.045,.355,1) forwards; }

/* controls */
.controls { display:flex; align-items:center; gap:14px; margin-top:20px; background:var(--bg2); padding:10px 22px; border-radius:50px; border:1px solid var(--border); }
.ctrl { background:rgba(201,168,76,.14); border:1px solid rgba(201,168,76,.28); color:var(--gold); width:38px; height:38px; border-radius:50%; font-size:15px; cursor:pointer; transition:background .15s; display:flex; align-items:center; justify-content:center; }
.ctrl:hover { background:rgba(201,168,76,.28); }
.ctrl:active { transform:scale(.93); }
.ctrl:disabled { opacity:.25; cursor:default; }
.page-info { font-size:13px; color:var(--muted); min-width:90px; text-align:center; }
.page-info strong { color:var(--gold); }

.key-hint { margin-top:8px; font-size:11px; color:#2e2d50; }
.key-hint kbd { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); border-radius:4px; padding:1px 5px; font-family:monospace; font-size:10px; }

/* thumbs */
.thumb-bar { display:flex; gap:7px; margin-top:16px; max-width:min(90vw,820px); overflow-x:auto; padding:6px 4px; scrollbar-width:thin; scrollbar-color:#2a2940 transparent; }
.thumb { flex-shrink:0; cursor:pointer; border:2px solid transparent; border-radius:5px; overflow:hidden; opacity:.45; transition:opacity .2s,border-color .2s; position:relative; }
.thumb:hover { opacity:.75; }
.thumb.active { border-color:var(--gold); opacity:1; }
.thumb canvas,.thumb img { display:block; }
.thumb-num { position:absolute; bottom:2px; left:0; right:0; text-align:center; font-size:9px; color:rgba(255,255,255,.7); background:rgba(0,0,0,.45); }

/* loading */
.loader { position:fixed; inset:0; background:rgba(15,14,26,.93); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:999; }
.loader.show { display:flex; }
.spinner { width:44px; height:44px; border:4px solid rgba(201,168,76,.18); border-top-color:var(--gold); border-radius:50%; animation:spin .75s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.loader-text { margin-top:12px; font-size:13px; color:var(--muted); }
.prog-bar { width:180px; height:3px; background:rgba(255,255,255,.08); border-radius:2px; margin-top:10px; overflow:hidden; }
.prog-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold2)); border-radius:2px; transition:width .3s; width:0%; }

input[type=file] { display:none; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="site-logo">📚 <span>Миний</span> номын сан</div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="showHome()">🏠 Нүүр</button>
    <label class="btn btn-primary" for="fileUpload">＋ Файл нэмэх</label>
    <input type="file" id="fileUpload" accept=".pdf,.pptx,.ppt" multiple>
  </div>
</header>

<!-- HOME PAGE -->
<main id="homePage">
  <div class="hero">
    <h1>Таны <em>flipbook</em> номын сан</h1>
    <p>PDF болон PPTX файлуудаа ном шиг хуудаслан унш</p>
  </div>

  <!-- Upload drop area -->
  <label class="upload-area" id="dropArea" for="fileUpload">
    <div style="font-size:36px;margin-bottom:12px;">📂</div>
    <p><strong>Файл чирж тавих</strong> эсвэл дарж сонгоно уу</p>
    <p style="margin-top:6px;">PDF · PPTX — браузерт шууд нээгдэнэ</p>
  </label>

  <!-- Pre-configured files (GitHub-д docs/ хавтсанд байрших файлууд) -->
  <div class="section-title">Хадгалагдсан номууд</div>
  <div class="file-grid" id="savedGrid">
    <!-- JS-ээр дүүргэнэ -->
  </div>

  <div class="section-title">Энэ хуралдаанд нээсэн файлууд</div>
  <div class="file-grid" id="sessionGrid">
    <div class="empty-state" id="emptyMsg">
      <span class="icon">📄</span>
      <p>Одоохондоо файл нэмээгүй байна</p>
      <p style="margin-top:6px;font-size:12px;">Дээрх товчоор нэмнэ үү</p>
    </div>
  </div>
</main>

<!-- VIEWER PAGE -->
<div id="viewerPage">
  <div class="back-bar">
    <button class="back-btn" onclick="showHome()">← Буцах</button>
    <span class="viewer-filename" id="viewerFilename"></span>
  </div>

  <div class="toolbar">
    <button class="tb" id="zOut">−</button>
    <span class="zoom-label" id="zLabel">100%</span>
    <button class="tb" id="zIn">+</button>
    <div class="tb-sep"></div>
    <button class="tb" id="fitBtn">⊡</button>
    <button class="tb" id="fsBtn">⛶</button>
  </div>

  <div class="book-stage">
    <div class="book" id="book">
      <div class="pw L" id="LW"></div>
      <div class="pw R" id="RW"></div>
      <div class="flip-layer" id="FL">
        <canvas class="ff" id="FF"></canvas>
        <canvas class="fb" id="FB"></canvas>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl" id="firstBtn">⟪</button>
    <button class="ctrl" id="prevBtn">‹</button>
    <div class="page-info"><strong id="curP">1</strong><span id="curP2"></span> / <strong id="totP">?</strong></div>
    <button class="ctrl" id="nextBtn">›</button>
    <button class="ctrl" id="lastBtn">⟫</button>
  </div>
  <div class="key-hint"><kbd>←</kbd><kbd>→</kbd> хуудас · <kbd>+</kbd><kbd>−</kbd> томруулах</div>
  <div class="thumb-bar" id="thumbBar"></div>
</div>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="spinner"></div>
  <div class="loader-text" id="loaderText">Уншиж байна...</div>
  <div class="prog-bar"><div class="prog-fill" id="loaderProg"></div></div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── SAVED FILES CONFIG ─────────────────────────────────────────────
// GitHub дээр docs/ хавтсанд байрших файлуудаа энд нэмнэ үү:
const SAVED_FILES = [
  // { name: 'Компанийн танилцуулга',  path: 'docs/tanilsuulga.pdf',  type: 'pdf'  },
  // { name: 'Q3 Тайлан',              path: 'docs/report_q3.pdf',    type: 'pdf'  },
  // { name: 'Слайд хичээл',           path: 'docs/lecture.pptx',     type: 'pptx' },
];
// ──────────────────────────────────────────────────────────────────

// ── STATE ──────────────────────────────────────────────────────────
let mode='', pdfDoc=null, slides=[], totalPages=0, totalSpreads=0;
let spread=0, scale=1.3, busy=false;
let pageW=0, pageH=0;
const sessionFiles = [];

// ── UI SWITCHING ──────────────────────────────────────────────────
function showHome() {
  document.getElementById('homePage').style.display='block';
  document.getElementById('viewerPage').style.display='none';
}
function showViewer(name) {
  document.getElementById('homePage').style.display='none';
  document.getElementById('viewerPage').style.display='flex';
  document.getElementById('viewerFilename').textContent = name;
}

// ── BUILD SAVED GRID ──────────────────────────────────────────────
function buildSavedGrid() {
  const g = document.getElementById('savedGrid');
  if (!SAVED_FILES.length) {
    g.innerHTML = `<p style="color:var(--muted);font-size:13px;padding:8px 0;">
      GitHub-д <code style="background:rgba(255,255,255,.08);padding:2px 6px;border-radius:4px;">docs/</code> 
      хавтсандаа файл оруулаад <code>SAVED_FILES</code> массивт нэмнэ үү.</p>`;
    return;
  }
  SAVED_FILES.forEach((f,i) => {
    const card = makeCard(f.name, f.type, () => loadFromURL(f.path, f.name, f.type));
    g.appendChild(card);
  });
}

function makeCard(name, type, onclick) {
  const card = document.createElement('div');
  card.className = 'file-card';
  const icon = type==='pdf' ? '📄' : '📊';
  const badge = type==='pdf' ? '<span class="card-badge badge-pdf">PDF</span>' : '<span class="card-badge badge-pptx">PPTX</span>';
  card.innerHTML = `<span class="card-icon">${icon}</span>
<div class="card-name">${name}</div>
<div class="card-meta">${new Date().toLocaleDateString('mn-MN')}</div>${badge}`;
  card.addEventListener('click', onclick);
  return card;
}

// ── FILE INPUT ────────────────────────────────────────────────────
document.getElementById('fileUpload').addEventListener('change', e => {
  [...e.target.files].forEach(loadFileObj);
});

const da = document.getElementById('dropArea');
da.addEventListener('dragover', e => { e.preventDefault(); da.classList.add('over'); });
da.addEventListener('dragleave', () => da.classList.remove('over'));
da.addEventListener('drop', e => {
  e.preventDefault(); da.classList.remove('over');
  [...e.dataTransfer.files].forEach(loadFileObj);
});

function loadFileObj(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['pdf','pptx','ppt'].includes(ext)) return;
  const url = URL.createObjectURL(file);
  sessionFiles.push({ name: file.name, url, type: ext==='pdf'?'pdf':'pptx' });
  rebuildSessionGrid();
  loadFromURL(url, file.name, ext==='pdf'?'pdf':'pptx');
}

function rebuildSessionGrid() {
  const g = document.getElementById('sessionGrid');
  document.getElementById('emptyMsg')?.remove();
  sessionFiles.forEach((f, i) => {
    if (document.getElementById('sf-'+i)) return;
    const card = makeCard(f.name, f.type, () => loadFromURL(f.url, f.name, f.type));
    card.id = 'sf-'+i;
    g.appendChild(card);
  });
}

// ── LOAD FROM URL ─────────────────────────────────────────────────
async function loadFromURL(url, name, type) {
  showLoader('Уншиж байна...');
  try {
    if (type==='pdf') await loadPDF(url, name);
    else await loadPPTX(url, name);
  } catch(e) {
    hideLoader();
    alert('Файл нээхэд алдаа гарлаа: ' + e.message);
  }
}

// ── PDF ───────────────────────────────────────────────────────────
async function loadPDF(url, name) {
  mode='pdf'; slides=[];
  const task = pdfjsLib.getDocument(url);
  task.onProgress = p => { if(p.total) setProg(5 + p.loaded/p.total*40); };
  pdfDoc = await task.promise;
  totalPages = pdfDoc.numPages;
  const vp = (await pdfDoc.getPage(1)).getViewport({ scale });
  pageW=vp.width; pageH=vp.height;
  await initViewer(name);
  await buildPDFThumbs();
  hideLoader();
  await renderSpread(0);
}

// ── PPTX ──────────────────────────────────────────────────────────
async function loadPPTX(url, name) {
  mode='pptx'; pdfDoc=null; slides=[];
  const buf = await (await fetch(url)).arrayBuffer();
  const zip = await JSZip.loadAsync(buf);
  let sW=960, sH=540;
  try {
    const px = await zip.file('ppt/presentation.xml').async('string');
    const cxM=px.match(/cx="(\d+)"/), cyM=px.match(/cy="(\d+)"/);
    if(cxM&&cyM){sW=Math.round(parseInt(cxM[1])/914400*96); sH=Math.round(parseInt(cyM[1])/914400*96);}
  }catch(e){}

  const slideFiles = Object.keys(zip.files)
    .filter(f=>/^ppt\/slides\/slide\d+\.xml$/.test(f))
    .sort((a,b)=>parseInt(a.match(/\d+/)[0])-parseInt(b.match(/\d+/)[0]));
  totalPages = slideFiles.length;
  if(!totalPages){hideLoader();alert('Слайд олдсонгүй.');return;}

  const rW=Math.max(sW,640), rH=Math.round(rW*sH/sW);
  pageW=rW; pageH=rH;

  const media={};
  for(const[p,e] of Object.entries(zip.files)){
    if(p.startsWith('ppt/media/')&&!e.dir){
      const ex=p.split('.').pop().toLowerCase();
      const mime=ex==='png'?'image/png':ex==='jpg'||ex==='jpeg'?'image/jpeg':'image/png';
      media[p.split('/').pop()]=URL.createObjectURL(new Blob([await e.async('blob')],{type:mime}));
    }
  }

  for(let i=0;i<slideFiles.length;i++){
    setProg(10+i/slideFiles.length*75);
    setLoaderText(`Слайд боловсруулж байна ${i+1}/${slideFiles.length}...`);
    const sxml=await zip.file(slideFiles[i]).async('string');
    let bg='#FFFFFF';
    const bgM=sxml.match(/<p:bg>[\s\S]*?<a:srgbClr val="([0-9A-Fa-f]{6})"[\s\S]*?<\/p:bg>/);
    if(bgM)bg='#'+bgM[1];
    const cv=document.createElement('canvas'); cv.width=rW; cv.height=rH;
    const ctx=cv.getContext('2d');
    ctx.fillStyle=bg; ctx.fillRect(0,0,rW,rH);

    // Images
    for(const m of sxml.matchAll(/<p:pic>[\s\S]*?<\/p:pic>/g)){
      const rIdM=m[0].match(/r:embed="(rId\d+)"/); if(!rIdM)continue;
      const rp=slideFiles[i].replace('slides/slide','slides/_rels/slide').replace('.xml','.xml.rels');
      try{
        const rx=await zip.file(rp).async('string');
        const tM=new RegExp(`Id="${rIdM[1]}"[^>]+Target="([^"]+)"`).exec(rx);
        if(!tM)continue;
        const tgt=tM[1].split('/').pop();
        if(!media[tgt])continue;
        const oM=m[0].match(/<a:off x="(\d+)" y="(\d+)"/);
        const eM=m[0].match(/<a:ext cx="(\d+)" cy="(\d+)"/);
        if(!oM||!eM)continue;
        const EMU=914400,scX=rW/(sW/96),scY=rH/(sH/96);
        const x=parseInt(oM[1])/EMU*scX,y=parseInt(oM[2])/EMU*scY;
        const w=parseInt(eM[1])/EMU*scX,h=parseInt(eM[2])/EMU*scY;
        await new Promise(res=>{const img=new Image();img.onload=()=>{ctx.drawImage(img,x,y,w,h);res();};img.onerror=res;img.src=media[tgt];});
      }catch(e2){}
    }

    // Text
    for(const sp of sxml.matchAll(/<p:sp>[\s\S]*?<\/p:sp>/g)){
      const oM=sp[0].match(/<a:off x="(\d+)" y="(\d+)"/);
      const eM=sp[0].match(/<a:ext cx="(\d+)" cy="(\d+)"/);
      if(!oM||!eM)continue;
      const EMU=914400,scX=rW/(sW/96),scY=rH/(sH/96);
      const x=parseInt(oM[1])/EMU*scX,y=parseInt(oM[2])/EMU*scY;
      const w=parseInt(eM[1])/EMU*scX,h2=parseInt(eM[2])/EMU*scY;
      const fM=sp[0].match(/<a:solidFill>[\s\S]*?<a:srgbClr val="([0-9A-Fa-f]{6})"[\s\S]*?<\/a:solidFill>/);
      if(fM){ctx.fillStyle='#'+fM[1];ctx.fillRect(x,y,w,h2);}
      let ty=y+8;
      for(const para of sp[0].matchAll(/<a:p>([\s\S]*?)<\/a:p>/g)){
        const runs=[...para[1].matchAll(/<a:r>([\s\S]*?)<\/a:r>/g)];
        if(!runs.length){ty+=14;continue;}
        let txt='',fs=14*scY,bold=false,clr='#222';
        for(const r of runs){
          const szM=r[1].match(/sz="(\d+)"/); if(szM)fs=parseInt(szM[1])/100*scY;
          if(/<a:rPr[^>]*b="1"/.test(r[1]))bold=true;
          const cM=r[1].match(/<a:solidFill>[\s\S]*?<a:srgbClr val="([0-9A-Fa-f]{6})"[\s\S]*?<\/a:solidFill>/);
          if(cM)clr='#'+cM[1];
          for(const t of r[1].matchAll(/<a:t>([^<]*)<\/a:t>/g))txt+=t[1];
        }
        if(txt.trim()){
          ctx.font=`${bold?'600':'400'} ${Math.max(10,fs)}px Segoe UI,Arial,sans-serif`;
          ctx.fillStyle=clr;
          ctx.save(); ctx.rect(x,y,w,h2); ctx.clip();
          const words=txt.split(' '); let line='';
          for(const wd of words){
            const test=line+wd+' ';
            if(ctx.measureText(test).width>w-10&&line){ctx.fillText(line.trim(),x+6,ty+fs);ty+=fs*1.25;line=wd+' ';}else line=test;
          }
          if(line.trim()){ctx.fillText(line.trim(),x+6,ty+fs);ty+=fs*1.4;}
          ctx.restore();
        }else ty+=fs*1.3;
      }
    }
    slides.push(cv.toDataURL('image/jpeg',.92));
  }

  await initViewer(name);
  await buildPPTXThumbs();
  hideLoader();
  await renderSpread(0);
}

// ── VIEWER INIT ───────────────────────────────────────────────────
async function initViewer(name) {
  totalSpreads=Math.ceil(totalPages/2); spread=0;
  document.getElementById('totP').textContent=totalPages;
  document.getElementById('LW').innerHTML='';
  document.getElementById('RW').innerHTML='';
  const lc=mk(pageW,pageH,'LC'); const rc=mk(pageW,pageH,'RC');
  document.getElementById('LW').appendChild(lc);
  document.getElementById('RW').appendChild(rc);
  const FL=document.getElementById('FL');
  FL.style.width=pageW+'px'; FL.style.height=pageH+'px';
  document.getElementById('FF').width=document.getElementById('FB').width=pageW;
  document.getElementById('FF').height=document.getElementById('FB').height=pageH;
  document.getElementById('thumbBar').innerHTML='';
  showViewer(name);
  updateBtns();
}

function mk(w,h,id){const c=document.createElement('canvas');c.width=w;c.height=h;c.id=id;return c;}

// ── RENDER ────────────────────────────────────────────────────────
async function renderSpread(s){
  spread=s;
  const lp=s*2+1, rp=s*2+2;
  document.getElementById('curP').textContent=lp;
  document.getElementById('curP2').textContent=rp<=totalPages?'-'+rp:'';
  await renderToCanvas(document.getElementById('LC'),lp);
  await renderToCanvas(document.getElementById('RC'),rp<=totalPages?rp:0);
  updateThumb(); updateBtns();
}

async function renderToCanvas(cv,pn){
  const ctx=cv.getContext('2d');
  if(!pn){ctx.fillStyle='#f0ebe0';ctx.fillRect(0,0,cv.width,cv.height);return;}
  if(mode==='pdf'){
    const pg=await pdfDoc.getPage(pn);
    const vp=pg.getViewport({scale});
    cv.width=vp.width; cv.height=vp.height;
    ctx.fillStyle='#f5f0e4'; ctx.fillRect(0,0,cv.width,cv.height);
    await pg.render({canvasContext:ctx,viewport:vp}).promise;
  }else{
    const img=new Image();
    await new Promise(r=>{img.onload=r;img.src=slides[pn-1];});
    cv.width=img.width; cv.height=img.height;
    ctx.drawImage(img,0,0);
  }
}

// ── FLIP ──────────────────────────────────────────────────────────
async function flipFwd(){
  if(busy||spread>=totalSpreads-1)return; busy=true;
  const nx=spread+1;
  document.getElementById('FF').getContext('2d').drawImage(document.getElementById('RC'),0,0);
  await renderToCanvas(document.getElementById('FB'),nx*2+1);
  const FL=document.getElementById('FL'); FL.style.left=pageW+'px'; FL.className='flip-layer go-fwd';
  await renderToCanvas(document.getElementById('LC'),nx*2+1);
  await renderToCanvas(document.getElementById('RC'),nx*2+2<=totalPages?nx*2+2:0);
  FL.addEventListener('animationend',()=>{
    FL.className='flip-layer'; spread=nx;
    document.getElementById('curP').textContent=spread*2+1;
    document.getElementById('curP2').textContent=spread*2+2<=totalPages?'-'+(spread*2+2):'';
    updateThumb(); updateBtns(); busy=false;
  },{once:true});
}

async function flipBwd(){
  if(busy||spread<=0)return; busy=true;
  const pv=spread-1;
  document.getElementById('FB').getContext('2d').drawImage(document.getElementById('LC'),0,0);
  await renderToCanvas(document.getElementById('FF'),pv*2+2<=totalPages?pv*2+2:0);
  const FL=document.getElementById('FL'); FL.style.left=pageW+'px'; FL.className='flip-layer go-bwd';
  await renderToCanvas(document.getElementById('LC'),pv*2+1);
  await renderToCanvas(document.getElementById('RC'),pv*2+2<=totalPages?pv*2+2:0);
  FL.addEventListener('animationend',()=>{
    FL.className='flip-layer'; spread=pv;
    document.getElementById('curP').textContent=spread*2+1;
    document.getElementById('curP2').textContent=spread*2+2<=totalPages?'-'+(spread*2+2):'';
    updateThumb(); updateBtns(); busy=false;
  },{once:true});
}

// ── CONTROLS ─────────────────────────────────────────────────────
document.getElementById('prevBtn').onclick=flipBwd;
document.getElementById('nextBtn').onclick=flipFwd;
document.getElementById('firstBtn').onclick=()=>{if(!busy)renderSpread(0);};
document.getElementById('lastBtn').onclick=()=>{if(!busy)renderSpread(totalSpreads-1);};
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')flipFwd();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')flipBwd();
  if(e.key==='+'||e.key==='=')changeZoom(.15);
  if(e.key==='-')changeZoom(-.15);
});
let tx0=0;
document.getElementById('book').addEventListener('touchstart',e=>tx0=e.touches[0].clientX);
document.getElementById('book').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx0;
  if(dx<-50)flipFwd();else if(dx>50)flipBwd();
});

function updateBtns(){
  document.getElementById('prevBtn').disabled=spread<=0;
  document.getElementById('firstBtn').disabled=spread<=0;
  document.getElementById('nextBtn').disabled=spread>=totalSpreads-1;
  document.getElementById('lastBtn').disabled=spread>=totalSpreads-1;
}

// ── ZOOM ──────────────────────────────────────────────────────────
async function changeZoom(d){
  scale=Math.max(.4,Math.min(3,scale+d));
  document.getElementById('zLabel').textContent=Math.round(scale/1.3*100)+'%';
  if(mode==='pdf'&&pdfDoc){
    const vp=(await pdfDoc.getPage(1)).getViewport({scale});
    pageW=vp.width; pageH=vp.height;
    [document.getElementById('LC'),document.getElementById('RC'),
     document.getElementById('FF'),document.getElementById('FB')].forEach(c=>{c.width=pageW;c.height=pageH;});
    document.getElementById('FL').style.width=pageW+'px';
    document.getElementById('FL').style.height=pageH+'px';
  }
  await renderSpread(spread);
}
document.getElementById('zIn').onclick=()=>changeZoom(.15);
document.getElementById('zOut').onclick=()=>changeZoom(-.15);
document.getElementById('fitBtn').onclick=async()=>{
  const sw=window.innerWidth*.85;
  if(mode==='pdf'&&pdfDoc){const vp=(await pdfDoc.getPage(1)).getViewport({scale:1});scale=sw/2/vp.width;}
  else scale=1;
  await changeZoom(0);
};
document.getElementById('fsBtn').onclick=()=>{
  if(!document.fullscreenElement)document.documentElement.requestFullscreen();
  else document.exitFullscreen();
};

// ── THUMBNAILS ───────────────────────────────────────────────────
async function buildPDFThumbs(){
  const tb=document.getElementById('thumbBar'); tb.innerHTML='';
  const ts=.13;
  for(let i=1;i<=totalPages;i++){
    setProg(55+i/totalPages*40);
    setLoaderText(`Жижиг зураг: ${i}/${totalPages}`);
    const pg=await pdfDoc.getPage(i);
    const vp=pg.getViewport({scale:ts});
    const tc=mk(vp.width,vp.height,'');
    tc.getContext('2d').fillStyle='#f5f0e4';
    tc.getContext('2d').fillRect(0,0,tc.width,tc.height);
    await pg.render({canvasContext:tc.getContext('2d'),viewport:vp}).promise;
    tb.appendChild(mkThumb(tc,i));
  }
}
async function buildPPTXThumbs(){
  const tb=document.getElementById('thumbBar'); tb.innerHTML='';
  slides.forEach((src,i)=>{
    const img=document.createElement('img');
    img.src=src; img.style.cssText='width:80px;height:auto;display:block;';
    tb.appendChild(mkThumb(img,i+1));
  });
}
function mkThumb(child,pn){
  const w=document.createElement('div'); w.className='thumb'; w.dataset.page=pn;
  w.appendChild(child);
  const n=document.createElement('div'); n.className='thumb-num'; n.textContent=pn;
  w.appendChild(n);
  w.addEventListener('click',()=>{if(!busy)renderSpread(Math.floor((pn-1)/2));});
  return w;
}
function updateThumb(){
  const lp=spread*2+1,rp=spread*2+2;
  document.getElementById('thumbBar').querySelectorAll('.thumb').forEach(t=>{
    const p=parseInt(t.dataset.page);
    t.classList.toggle('active',p===lp||p===rp);
  });
  const a=document.getElementById('thumbBar').querySelector('.thumb.active');
  if(a)a.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

// ── LOADER ────────────────────────────────────────────────────────
function showLoader(msg){setLoaderText(msg);setProg(0);document.getElementById('loader').classList.add('show');}
function hideLoader(){document.getElementById('loader').classList.remove('show');}
function setProg(v){document.getElementById('loaderProg').style.width=v+'%';}
function setLoaderText(t){document.getElementById('loaderText').textContent=t;}

// ── INIT ─────────────────────────────────────────────────────────
buildSavedGrid();
</script>
